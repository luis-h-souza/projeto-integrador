<!DOCTYPE html>
<html lang="pt-br">

<head>
  <title>LocalCo - Coworking</title>
  <!-- Required meta tags -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta name="description"
    content="Site da empresa LocalCo que é voltado para o Coworking, que tem por finalidade o aluguel de salas para trabalho" />

  <!-- Favicon -->
  <link rel="icon" href="../assets/icon/Favicon.ico" type="image/x-icon" />

  <!-- Bootstrap CSS v5.2.1 -->
  <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" /> -->

  <!-- Biblioteca AOS - Animação de textos -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

  <link rel="stylesheet" href="../css/login.css" />
</head>

<body>

  <div id="container-mensagens"></div>

  <div class="login-wrapper">
    <div class="login-side">
      <div class="my-form__wrapper">
        <div class="login-welcome-row">
          <h1 class="h1">Faça seu cadastro.</h1>
        </div>

        <section class="row">

          <form class="my-form" id="formCadastro" method="post">
            <div class="row mb-3">
              <div class="col-12 text-field">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="criarNome" name="nome" placeholder="Seu nome completo" required />
                <img alt="Usuário Icon" src="../assets/icon/email.svg" />
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6 text-field">
                <label for="email">E-mail:</label>
                <input type="email" id="criarEmail" name="email" placeholder="Seu e-mail" required />
                <img alt="Email Icon" src="../assets/icon/email.svg" />
              </div>
              <div class="col-md-6 text-field">
                <label for="password">Senha:</label>
                <input id="criarSenha" type="password" name="password" placeholder="Sua senha" required />
                <img alt="Password Icon" src="../assets/icon/password.svg" />
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-12">
                <label class="form-label d-block fw-bold mb-2">Tipo de Pessoa:</label>
                    <div class="row mb-3">
                        <div class="col-md-6 mb-3">
                            <div class="form-check d-flex align-items-center">
                                <input class="radio" type="radio" name="tipo_pessoa" id="ps_fisica" value="fisica" checked>
                                <label class="form-check-label ms-2" for="ps_fisica">Pessoa Física</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check d-flex align-items-center">
                                <input class="radio" type="radio" name="tipo_pessoa" id="ps_juridica" value="juridica">
                                <label class="form-check-label ms-2" for="ps_juridica">Pessoa Jurídica</label>
                            </div>
                        </div>
                    </div>
            </div>

            <div class="row mb-3">
              <div class="col-12 text-field" id="containerCPF">
                <label for="criarCPF">CPF:</label>
                <input type="text" id="criarCPF" name="cpf" placeholder="000.000.000-00" />
              </div>
              <div class="col-12 text-field d-none" id="containerCNPJ">
                <label for="criarCNPJ">CNPJ:</label>
                <input type="text" id="criarCNPJ" name="cnpj" placeholder="00.000.000/0000-00" />
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6 text-field">
                <label for="criarTelefone">Telefone:</label>
                <input type="text" id="criarTelefone" name="telefone" placeholder="(00) 0000-0000" />
              </div>
              <div class="col-md-6 text-field">
                <label for="criarCelular">Celular:</label>
                <input type="text" id="criarCelular" name="celular" placeholder="(00) 00000-0000" />
              </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-8 text-field">
                  <label for="criarRua">Rua:</label>
                  <input type="text" id="criarRua" name="rua" placeholder="Nome da rua" />
                </div>
                <div class="col-md-4 text-field">
                  <label for="criarNumero">Número:</label>
                  <input type="text" id="criarNumero" name="numero" placeholder="Nº" />
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6 text-field">
                  <label for="criarBairro">Bairro:</label>
                  <input type="text" id="criarBairro" name="bairro" placeholder="Seu bairro" />
                </div>
                <div class="col-md-6 text-field">
                  <label for="criarComplemento">Complemento:</label>
                  <input type="text" id="criarComplemento" name="complemento" placeholder="Apt / Bloco" />
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-5 text-field">
                  <label for="criarCidade">Cidade:</label>
                  <input type="text" id="criarCidade" name="cidade" placeholder="Cidade" />
                </div>
                <div class="col-md-3 text-field">
                  <label for="criarEstado">Estado:</label>
                  <input type="text" id="criarEstado" name="estado" placeholder="UF" />
                </div>
                <div class="col-md-4 text-field">
                  <label for="criarPais">País:</label>
                  <input type="text" id="criarPais" name="pais" value="Brasil" placeholder="País" />
                </div>
            </div>

            <input type="button" class="my-form__button" value="Cadastrar" id="cadastrarLogin" />

            <div class="my-form__actions">
              <div class="my-form__signup">
                <a href="./login.html"> Voltar </a>
              </div>
            </div>
  
          </form>

        </section>

      </div>
    </div>
    <div class="info-side"></div>
  </div>

  <!-- Bootstrap JavaScript Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
    integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
    crossorigin="anonymous"></script>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  
  <script type="module" src="../js/main.js" defer></script>
  <script type="module" src="../js/cadastrar.js" defer></script>

</body>

</html>
