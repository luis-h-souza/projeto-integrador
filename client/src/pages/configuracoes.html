<!DOCTYPE html>
<html lang="pt-br">

<head>
    <title>LocalCo - Configurações de Perfil</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description"
        content="Site da empresa LocalCo que é voltado para o Coworking, que tem por finalidade o aluguel de salas para trabalho" />

    <!-- Favicon -->
    <link rel="icon" href="../assets/icon/Favicon.ico" type="image/x-icon" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/dropdown.css">
    <style>
        .settings-card {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 2rem;
            margin-bottom: 4rem;
        }
        .form-section-title {
            color: var(--primary-light);
            border-bottom: 2px solid var(--primary-light);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }
        .btn-save {
            background-color: var(--primary-light);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            border: none;
            transition: all 0.2s;
        }
        .btn-save:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <div class="container-fluid p-0">
        <div class="container">
            <header class="header">
                <nav class="navbar navbar-expand-lg navbar-ligth ">
                    <div class="container-fluid">
                        <img class="logoPC img-fluid" src="../assets/img/Logo.svg" alt="Logo da empresa - LocalCo" />

                        <button class="navbar-toggler me-3" type="button" data-bs-toggle="offcanvas"
                            data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar">
                            <span class="navbar-toggler-icon"></span>
                        </button>

                        <div class="offcanvas offcanvas-end offcanvas-link" tabindex="-1" id="offcanvasNavbar"
                            aria-labelledby="offcanvasNavbarLabel">
                            <div class="offcanvas-header bg-navbar ">
                                <img src="../assets/img/Logo.svg" class="offcanvas-title w-25 "
                                    id="offcanvasNavbarLabel"></img>
                                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"
                                    aria-label="Close"></button>
                            </div>
                            <div class="offcanvas-body bg-navbar">
                                <ul class="navbar-nav justify-content-center flex-grow-1">
                                    <li class="nav-item mx-md-3">
                                        <a class="nav-link active" aria-current="page" href="../../index.html">Home</a>
                                    </li>
                                    <li class="nav-item mx-md-3">
                                        <a class="nav-link" href="./galeria-salas.html">Salas</a>
                                    </li>
                                    <li class="nav-item mx-md-3">
                                        <a class="nav-link" href="./meus-agendamentos.html">Meus Agendamentos</a>
                                    </li>
                                    <li class="nav-item mx-md-3">
                                        <a class="nav-link" href="./contato.html">Contato</a>
                                    </li>
                                </ul>
                            </div>
                        </div>

                        <span class="navigation__group">
                            <button type="button" class="profile__btn me-2">
                                <img src="../assets/img/default-avatar.png" alt="Usuário">
                            </button>
                            
                            <div class="dropdown__wrapper">
                                <nav>
                                    <div class="profile__wrapper">
                                        <img class="profile__avatar__drop " src="../assets/img/default-avatar.png"
                                            alt="Usuário">
                                        <div id="profileInfo" class="profile__description">
                                            <!-- NOME E EMAIL -->
                                        </div>
                                    </div>
                                    <hr class="divider">
                                    <ul>
                                        <li>
                                            <a href="./meus-agendamentos.html" class="d-flex align-items-center text-decoration-none text-reset w-100 h-100">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-user-check"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M8 7a4 4 0 1 0 8 0a4 4 0 0 0 -8 0" /><path d="M6 21v-2a4 4 0 0 1 4 -4h4" /><path d="M15 19l2 2l4 -4" /></svg>    
                                                Agendamentos
                                            </a>
                                        </li>
                                        <li>
                                            <a href="./configuracoes.html" class="d-flex align-items-center text-decoration-none text-reset w-100 h-100">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-settings"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37c1 .608 2.296 .07 2.572 -1.065z" /><path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0" /></svg>                            
                                                Configurações
                                            </a>
                                        </li>
                                    </ul>
                                    <hr class="divider">
                                    <ul>
                                        <li id="logout">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-logout"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2" /><path d="M9 12h12l-3 -3" /><path d="M18 15l3 -3" /></svg>
                                            Logout
                                        </li>
                                    </ul>
                                </nav>
                            </div>
                        </span>
                    </div>
                </nav>
            </header>
        </div>
    </div>

    <main class="container">
        <div class="settings-card">
            <h1 class="mb-4">Minha Conta</h1>
            <form id="formPerfil">
                <div class="row">
                    <div class="col-md-6 mb-4">
                        <h5 class="form-section-title">Informações Pessoais</h5>
                        <div class="mb-3">
                            <label class="form-label">Nome Completo</label>
                            <input type="text" id="nome" name="nome" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" name="email" class="form-control" readonly>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Telefone</label>
                                <input type="text" id="telefone" name="telefone" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Celular</label>
                                <input type="text" id="celular" name="celular" class="form-control">
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6 mb-4">
                        <h5 class="form-section-title">Endereço</h5>
                        <div class="row">
                            <div class="col-md-8 mb-3">
                                <label class="form-label">Rua</label>
                                <input type="text" id="rua" name="rua" class="form-control">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Número</label>
                                <input type="text" id="numero" name="numero" class="form-control">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Bairro</label>
                            <input type="text" id="bairro" name="bairro" class="form-control">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Cidade</label>
                                <input type="text" id="cidade" name="cidade" class="form-control">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">Estado</label>
                                <input type="text" id="estado" name="estado" class="form-control" maxlength="2">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label class="form-label">País</label>
                                <input type="text" id="pais" name="pais" class="form-control" value="Brasil">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end mt-4">
                    <button type="submit" class="btn-save">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </main>

    <div id="container-mensagens"></div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
    <script type="module" src="../js/configuracoes.js"></script>
    <script type="module" src="../js/dropdown.js"></script>
</body>

</html>
