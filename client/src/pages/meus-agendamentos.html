    <!-- Container para mensagens toast -->
    <div id="container-mensagens" class="container-mensagens"></div>

    <section class="py-5">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <h1 class="mb-4">Meus Agendamentos</h1>

                    <!-- Filtros -->
                    <div class="card mb-4">
                        <div class="card-body">
                            <div class="row align-items-end">
                                <div class="col-md-4 mb-3 mb-md-0">
                                    <label for="filtroStatus" class="form-label fw-bold">Filtrar por Status</label>
                                    <select class="form-control" id="filtroStatus">
                                        <option value="">Todos</option>
                                        <option value="Agendado">Agendado</option>
                                        <option value="Em andamento">Em andamento</option>
                                        <option value="Finalizado">Finalizado</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3 mb-md-0">
                                    <button type="button" class="btn btn-primary"
                                        onclick="agendamentos.method.carregarAgendamentos()">
                                        <i class="bi bi-arrow-clockwise me-2"></i>Atualizar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Lista de Agendamentos -->
                    <div id="listaAgendamentos" class="row">
                        <!-- Os agendamentos serão carregados aqui via JavaScript -->
                        <div class="col-12 text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Carregando...</span>
                            </div>
                        </div>
                    </div>

                    <!-- Mensagem quando não há agendamentos -->
                    <div id="semAgendamentos" class="alert alert-info d-none">
                        <i class="bi bi-info-circle me-2"></i>
                        Você ainda não possui agendamentos. <a href="./galeria-salas.html" class="alert-link">Reserve
                            uma sala agora!</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="mt-5 ">
        <div class="container-fluid footer d-flex justify-content-center align-items-center">
            <p class="d-block text-center mb-0">

                <a href="#" class="fs-5 text-footer-um">&copy; LOCALCO</a>
            </p>
            <div class="item mx-lg-2 ps-3">
                <a href="#"><i class="fs-4 item insta bi bi-instagram"></i></a>
                <a href="#"><i class="fs-4 item face bi bi-facebook mx-lg-2"></i></a>
                <a href="#"><i class="fs-4 item x bi bi-twitter-x"></i></a>
            </div>
        </div>
